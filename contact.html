<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Contact | Sanjivani MCA</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      form {
        background-color: #f0f0f0;
        padding: 20px;
        border-radius: 8px;
      }
      input,
      textarea {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }
      button {
        background: #003366;
        color: white;
        padding: 10px 20px;
        margin-top: 15px;
        border: none;
        cursor: pointer;
      }
      button:hover {
        background: #001a33;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="faculty.html">Faculty</a>

      <a href="contact.html">Contact</a>
    </nav>

    <div class="container">
      <h2>Contact Us</h2>
      <form>
        <label for="name">Full Name:</label>
        <input type="text" id="name" required />

        <label for="email">Email:</label>
        <input type="email" id="email" required />

        <label for="message">Message:</label>
        <textarea id="message" rows="5" required></textarea>

        <button type="submit">Submit</button>
      </form>
    </div>

    <footer>
      <p>&copy; 2025 Sanjivani University – MCA Department</p>
    </footer>
  </body>
</html>
